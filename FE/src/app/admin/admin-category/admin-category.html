<div class="bg-[#09090f] min-h-screen p-6 md:p-8 text-white font-sans">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
        <div>
            <div class="inline-flex w-fit items-center gap-2 bg-[#f472b6]/10 border border-[#f472b6]/20 rounded-full px-3 py-1 mb-3">
                <span class="w-2 h-2 rounded-full bg-[#f472b6] animate-pulse"></span>
                <span class="text-[#f472b6] text-[10px] font-bold uppercase tracking-wider">
                    Hệ thống: 12 Danh mục
                </span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold leading-none tracking-tight"> 
                Quản lý 
                <span class="text-[#00d4ff]" style="text-shadow: rgba(0, 212, 255, 0.4) 0px 0px 20px;">
                    Danh Mục
                </span>
            </h1>
        </div>

        <button (click)="openCloseAddCategoryModal()" class="flex items-center gap-2 bg-[#00d4ff] text-[#09090f] font-bold px-5 py-2.5 rounded-xl hover:bg-[#00d4ff]/90 transition-all shadow-[0_0_15px_rgba(0,212,255,0.25)] hover:shadow-[0_0_25px_rgba(0,212,255,0.4)]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
            Thêm Danh Mục
        </button>
    </div>

    <div class="bg-[#111118] border border-slate-800 rounded-b-2xl overflow-hidden shadow-2xl relative">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="text-[#8888aa] text-xs uppercase tracking-wider border-y border-slate-800 bg-[#0c0c16]/50">
                        <th class="py-4 pl-6 font-medium w-16">ID</th>
                        <th class="py-4 px-4 font-medium">Tên Danh Mục</th>
                        <th class="py-4 px-4 font-medium text-left">Mô tả</th>
                        <th class="py-4 px-4 font-medium text-center">Số Sản Phẩm</th>
                        <th class="py-4 px-4 font-medium text-center">Thao tác</th>

                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-800/50">
                    @for(category of listOfCategories; track category.categoryId){
                    <tr class="hover:bg-[#1e1e30] transition-colors group">
                        <td class="py-4 pl-6">
                            <p class="font-bold text-[#555570]" style="font-family: Rajdhani, sans-serif;">#{{category.categoryId}}</p>
                        </td>
                        <td class="py-4 px-4">
                            <div class="flex items-center gap-3">
                                <div>
                                    <p class="text-white font-bold text-base group-hover:text-[#00d4ff] transition-colors">{{category.name}}</p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-4">
                            <p class="text-white font-sans group-hover:text-green-400">{{category.description}}</p>
                        </td>
                        <td class="text-center">
                            <p>{{category.countProduct}}</p>
                        </td>
                        <td class="flex justify-center gap-x-2 mt-3">
                            <button class="px-3 py-1.5 border bg-blue-700 rounded-lg border-transparent hover:cursor-pointer hover:scale-110" (click)="openUpdateCategoryModal(category)">Sửa</button>
                            <button class="px-3 py-1.5 border bg-red-700 rounded-lg border-transparent hover:cursor-pointer hover:scale-110" (click)="deleteCategory(category.categoryId)">Xóa</button>
                        </td>
                    </tr>
                    
                    }
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Form Add Category -->
    <div *ngIf="this.showAddCategory" class="fixed inset-0 bg-[#09090f]/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-[#111118] border border-slate-800 w-full max-w-xl max-h-[90vh] rounded-2xl flex flex-col shadow-2xl shadow-[#00d4ff]/10">
            
            <div class="px-6 py-5 border-b border-slate-800 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-[#00d4ff]/10 rounded-lg text-[#00d4ff]">
                        <img src="category.png" class="w-10 h-10">
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-wide">Thêm Danh Mục Mới</h2>
                </div>
                <button (click)="openCloseAddCategoryModal()" type="button" class="text-[#555570] hover:text-red-500 hover:cursor-pointer transition-colors bg-[#09090f] p-2 rounded-lg border border-transparent hover:border-slate-700">
                        <p class="px-2">X</p>
                </button>
            </div>
        <form [formGroup]="addCategoryForm" (ngSubmit)="onSubmit()">
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    
                    <div class="md:col-span-2">
                        <label class="block text-[#8888aa] text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Tên danh mục <span class="text-[#ff3d5a]">*</span></label>
                        <input formControlName="Name" type="text" placeholder="VD: Laptop, PC, Gaming Gear..."
                            class="w-full bg-[#09090f] border border-slate-800 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-[#00d4ff]/60 focus:ring-1 focus:ring-[#00d4ff]/60 transition-all placeholder-[#555570]">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[#8888aa] text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Mô tả danh mục</label>
                        <textarea formControlName="Description" rows="3" placeholder="Nhập mô tả ngắn gọn..."
                            class="w-full bg-[#09090f] border border-slate-800 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-[#00d4ff]/60 focus:ring-1 focus:ring-[#00d4ff]/60 transition-all placeholder-[#555570] resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-800 flex items-center justify-end gap-3 shrink-0 bg-[#0c0c16] rounded-b-2xl">
                <button (click)="openCloseAddCategoryModal()" type="button" class="px-5 py-2.5 rounded-xl border border-slate-700 hover:cursor-pointer text-[#8888aa] font-bold text-sm hover:bg-slate-800 hover:text-red-500 transition-all">
                    Hủy Bỏ
                </button>
                <button (click)="openCloseAddCategoryModal()" [disabled]="addCategoryForm.invalid" type="submit" class="disabled:opacity-50 disabled:cursor-not-allowed disabled:text-black px-5 py-2.5 rounded-xl hover:text-green-200 bg-[#00d4ff] hover:cursor-pointer text-[#09090f] font-bold text-sm hover:bg-[#00d4ff]/90 transition-all shadow-[0_0_15px_rgba(0,212,255,0.25)] flex items-center gap-2">
                    Lưu Danh Mục
                </button>
            </div>
        </form>

        </div>
    </div>

    <!-- Form Update Category -->
     <div *ngIf="this.showUpdateCategory" class="fixed inset-0 bg-[#09090f]/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-[#111118] border border-slate-800 w-full max-w-xl max-h-[90vh] rounded-2xl flex flex-col shadow-2xl shadow-[#00d4ff]/10">
            
            <div class="px-6 py-5 border-b border-slate-800 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-[#00d4ff]/10 rounded-lg text-[#00d4ff]">
                        <img src="category.png" class="w-10 h-10">
                    </div>
                    <h2 class="text-xl font-bold text-white tracking-wide">Cập Nhật Danh Mục</h2>
                </div>
                <button (click)="openCloseUpdateCategoryModal()" type="button" class="text-[#555570] hover:text-red-500 hover:cursor-pointer transition-colors bg-[#09090f] p-2 rounded-lg border border-transparent hover:border-slate-700">
                        <p class="px-2">X</p>
                </button>
            </div>
        <form [formGroup]="updateCategoryForm" (ngSubmit)="updateCategory()">
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="block text-[#8888aa] text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Danh mục (ID)</label>
                        <input type="text" [value]="updateCategoryForm.get('Name')?.value + ' (ID: ' + updateCategoryForm.get('CategoryId')?.value + ')'" disabled
                            class="w-full bg-[#09090f]/50 border border-slate-800 text-slate-500 text-sm rounded-xl px-4 py-3 cursor-not-allowed">
                        <input formControlName="CategoryId" type="hidden">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-[#8888aa] text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Tên danh mục <span class="text-[#ff3d5a]">*</span></label>
                        <input formControlName="Name" type="text" placeholder="VD: Laptop, PC, Gaming Gear..."
                            class="w-full bg-[#09090f] border border-slate-800 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-[#00d4ff]/60 focus:ring-1 focus:ring-[#00d4ff]/60 transition-all placeholder-[#555570]">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[#8888aa] text-xs font-bold mb-2 ml-1 uppercase tracking-wider">Mô tả danh mục</label>
                        <textarea formControlName="Description" rows="3" placeholder="Nhập mô tả ngắn gọn..."
                            class="w-full bg-[#09090f] border border-slate-800 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-[#00d4ff]/60 focus:ring-1 focus:ring-[#00d4ff]/60 transition-all placeholder-[#555570] resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-800 flex items-center justify-end gap-3 shrink-0 bg-[#0c0c16] rounded-b-2xl">
                <button (click)="openCloseUpdateCategoryModal()" type="button" class="px-5 py-2.5 rounded-xl border border-slate-700 hover:cursor-pointer text-[#8888aa] font-bold text-sm hover:bg-slate-800 hover:text-red-500 transition-all">
                    Hủy Bỏ
                </button>
                <button (click)="openCloseUpdateCategoryModal()" [disabled]="updateCategoryForm.invalid" type="submit" class="disabled:opacity-50 disabled:cursor-not-allowed disabled:text-black px-5 py-2.5 rounded-xl hover:text-green-200 bg-[#00d4ff] hover:cursor-pointer text-[#09090f] font-bold text-sm hover:bg-[#00d4ff]/90 transition-all shadow-[0_0_15px_rgba(0,212,255,0.25)] flex items-center gap-2">
                    Lưu Danh Mục
                </button>
            </div>
        </form>

        </div>
    </div>
</div>
